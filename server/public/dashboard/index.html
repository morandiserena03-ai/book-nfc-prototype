<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="/shared/nav.css">
    <link rel="stylesheet" href="/dashboard/style.css">
<head>
    <title>Dashboard</title>
</head>
<body>

    <header class="desktopHeader desktopHeaderDrawer">
        <a class="brandLink" href="/mobile" aria-label="Book Pride">
            <img src="/Icons/BookPride.png" alt="Book Pride">
        </a>

        <button
            class="desktopMenuButton"
            type="button"
            aria-label="Apri menu"
            aria-controls="desktopMenu"
            aria-expanded="false">
            <img src="/Icons/burger-bar.png" alt="">
        </button>

        <nav
            id="desktopMenu"
            class="desktopNav desktopMenuPanel"
            aria-label="Navigazione principale"
            aria-hidden="true">
            <a href="/dashboard" aria-current="page">Dashboard</a>
            <a href="/mobile">Mobile</a>
            <a href="/centro">Centro</a>
            <a href="/libri">Libreria dell'editore</a>
        </nav>
    </header>

    <h1 class="title">Dashboard</h1>

    <div id="usersContainer"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="/dashboard/app.js"></script>

</body>
</html>
