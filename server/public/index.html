<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">
    <title>Book NFC Prototype</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: #05053E;
            color: white;
            font-family: Arial, sans-serif;
        }

        main {
            width: min(100%, 760px);
            margin: 0 auto;
            padding: 40px 24px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2.4rem, 10vw, 5rem);
            line-height: 0.9;
            font-weight: 900;
        }

        p {
            max-width: 560px;
            margin: 0 0 32px;
            font-size: 1.05rem;
            line-height: 1.4;
            opacity: 0.82;
        }

        section {
            margin-top: 34px;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 0.85rem;
            line-height: 1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.72;
        }

        .links {
            display: grid;
            gap: 12px;
        }

        a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 58px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            padding: 16px 18px;
            color: white;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.06);
        }

        a::after {
            content: ">";
            opacity: 0.7;
        }

        a:focus,
        a:hover {
            background: white;
            color: #05053E;
        }
    </style>
</head>
<body>
    <main>
        <h1>Book NFC Prototype</h1>
        <p>Pagina rapida per aprire mobile, dashboard e conferme NFC senza digitare gli URL a mano.</p>

        <section>
            <h2>Pagine principali</h2>
            <div class="links">
                <a href="/mobile">Mobile</a>
                <a href="/dashboard">Dashboard</a>
            </div>
        </section>

        <section>
            <h2>Conferma libri</h2>
            <div class="links">
                <a href="/nfc/book1">I tredici colpevoli</a>
                <a href="/nfc/book2">Intermezzo</a>
                <a href="/nfc/book3">Trentatre piccole storie di design</a>
            </div>
        </section>
    </main>
</body>
</html>
