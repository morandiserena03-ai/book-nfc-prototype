<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">
    <title>Libreria dell'editore</title>
    <link rel="stylesheet" href="/shared/nav.css">
    <link rel="stylesheet" href="/libri/style.css">
</head>
<body class="loading">

    <main class="publisherLibrary" aria-live="polite">
        <header class="libraryHeader">
            <button id="closeButton" class="iconButton" type="button" aria-label="Chiudi">
                <span aria-hidden="true"></span>
            </button>
            <h1>Adelphi Editore</h1>
            <span aria-hidden="true"></span>
        </header>

        <section class="bookShelf" aria-label="Copertine disponibili">
            <div id="booksCarousel" class="booksCarousel"></div>
        </section>

        <section class="bookDetails" aria-live="polite">
            <h2 id="selectedBookTitle"></h2>
            <p id="selectedBookAuthor"></p>
            <button id="addBookButton" class="addBookButton" type="button">Aggiungi in libreria</button>
            <p id="libraryMessage" class="libraryMessage"></p>
        </section>
    </main>

    <div id="feedbackOverlay" class="feedbackOverlay" role="status" aria-live="polite" hidden>
        <section class="feedbackCard" aria-label="Libro aggiunto alla libreria">
            <img class="feedbackIcon" src="/Icons/book-added-check.png" alt="">
            <p class="feedbackTitle">Libro aggiunto alla libreria</p>
        </section>
    </div>

    <script src="/libri/app.js"></script>

</body>
</html>
