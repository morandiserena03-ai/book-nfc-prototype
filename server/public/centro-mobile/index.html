<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width,
                 height=device-height,
                 initial-scale=1,
                 maximum-scale=1,
                 user-scalable=no">
    <title>Centro Mobile</title>
    <link rel="stylesheet" href="/shared/nav.css">
    <link rel="stylesheet" href="/centro-mobile/style.css">
</head>
<body>

    <button id="backButton" class="back-button" type="button" aria-label="Torna indietro"></button>

    <header class="desktopHeader desktopHeaderDrawer">
        <a class="brandLink" href="/mobile" aria-label="Book Pride">
            <img src="/Icons/BookPride.png" alt="Book Pride">
        </a>

        <button
            class="desktopMenuButton"
            type="button"
            aria-label="Apri menu"
            aria-controls="desktopMenu"
            aria-expanded="false">
            <img src="/Icons/burger-bar.png" alt="">
        </button>

        <nav
            id="desktopMenu"
            class="desktopNav desktopMenuPanel"
            aria-label="Navigazione principale"
            aria-hidden="true">
            <a href="/dashboard">Dashboard</a>
            <a href="/mobile">Mobile</a>
            <a href="/centro" aria-current="page">Centro</a>
            <a href="/libri">Libreria dell'editore</a>
        </nav>
    </header>

    <nav class="mobileNav" aria-label="Navigazione mobile">
        <a href="/dashboard">Dashboard</a>
        <a href="/mobile">Mobile</a>
        <a href="/centro-mobile" aria-current="page">Centro</a>
        <a href="/libri">Libreria dell'editore</a>
    </nav>

    <main class="centerMobilePage">
        <h1>Avvicinati a...</h1>
        <div id="centerUserButtons" class="centerUserButtons" aria-live="polite"></div>
        <p id="centerMobileMessage" class="centerMobileMessage"></p>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="/centro-mobile/app.js"></script>

</body>
</html>
