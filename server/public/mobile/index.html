<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width,
                 height=device-height,
                 initial-scale=1,
                 maximum-scale=1,
                 user-scalable=no">
    <title>Mobile</title>
    <link rel="stylesheet" href="/shared/nav.css">
    <link rel="stylesheet" href="/mobile/style.css">
</head>

<body class="loading">

    <img
        id="pageLoader"
        class="page-loader"
        src="/Icons/Logo-animato.gif"
        alt="Caricamento"
    >

    <header class="desktopHeader">
        <a class="brandLink" href="/mobile" aria-label="Book Pride">
            <img src="/Icons/BookPride.png" alt="Book Pride">
        </a>

        <nav class="desktopNav" aria-label="Navigazione principale">
            <a href="/dashboard">Dashboard</a>
            <a href="/mobile">Mobile</a>
            <a href="/centro">Centro</a>
            <a href="/libri">Libri</a>
        </nav>
    </header>

    <nav class="mobileNav mobileNavCenterOnly" aria-label="Navigazione mobile">
        <a href="/centro-mobile">Centro</a>
    </nav>

    <main class="heroContent">
    <h1 class="title">
        <span>Benvenut* al</span>
        <span>Book Pride!</span>
    </h1>

    <div id="userRow">
        <h2 id="userNickname"></h2>
        <button id="deleteIconBtn" title="Cancella" onclick="deleteUser()" aria-label="Cancella" style="display:none;">
            <img src="/Icons/Cestino.png" alt="Cancella" id="deleteIconImg">
        </button>
    </div>

    <div id="registerBox">
        <input id="nickname" placeholder="Nickname">
        <button onclick="registerUser()">Register</button>
    </div>
    </main>

    <div id="stickers"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>

</body>
