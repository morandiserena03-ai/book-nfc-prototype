<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">
    <title>Centro</title>
    <link rel="stylesheet" href="/shared/nav.css">
    <link rel="stylesheet" href="/centro/style.css">
</head>
<body>

    <header class="desktopHeader desktopHeaderDrawer">
        <a class="brandLink" href="/mobile" aria-label="Book Pride">
            <img src="/Icons/BookPride.png" alt="Book Pride">
        </a>

        <button
            class="desktopMenuButton"
            type="button"
            aria-label="Apri menu"
            aria-controls="desktopMenu"
            aria-expanded="false">
            <img src="/Icons/burger-bar.png" alt="">
        </button>

        <nav
            id="desktopMenu"
            class="desktopNav desktopMenuPanel"
            aria-label="Navigazione principale"
            aria-hidden="true">
            <a href="/dashboard">Dashboard</a>
            <a href="/mobile">Mobile</a>
            <a href="/centro" aria-current="page">Centro</a>
            <a href="/libri">Libreria dell'editore</a>
        </nav>
    </header>

    <nav class="mobileNav" aria-label="Navigazione mobile">
        <a href="/dashboard">Dashboard</a>
        <a href="/mobile">Mobile</a>
        <a href="/centro-mobile">Centro</a>
        <a href="/libri">Libreria dell'editore</a>
    </nav>

    <main class="centerPage">
        <section
            id="bookMatchPanel"
            class="bookMatchPanel"
            aria-live="polite"
            hidden></section>
        <section id="centerUsers" class="centerUsers" aria-label="Utenti nel centro"></section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="/centro/app.js"></script>

</body>
</html>
